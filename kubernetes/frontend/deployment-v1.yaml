apiVersion: apps/v1
kind: Deployment

metadata:
  name: astro-blue

spec:
  replicas: 2

  selector:
    matchLabels:
      app: astro
      version: blue

  template:
    metadata:
      labels:
        app: astro
        version: blue

    spec:
      containers:
        - name: astro-frontend

          image: himanshux99/astro-frontend:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: astro-service

spec:
  type: ClusterIP

  selector:
    app: astro
    version: blue

  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

apiVersion: apps/v1
kind: Deployment

metadata:
  name: astro-deployment
  labels:
    app: astro
    tier: frontend
    version: v1

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Ensure zero-downtime

  selector:
    matchLabels:
      app: astro
      tier: frontend

  template:
    metadata:
      labels:
        app: astro
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"

    spec:
      # Pod disruption budget for zero-downtime
      terminationGracePeriodSeconds: 30

      containers:
        - name: astro
          image: himanshux99/astro-frontend:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # Resource limits for proper scaling
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Readiness probe - traffic only when ready
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Liveness probe - restart if stuck
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

          # Security context
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # Environment variables
          env:
            - name: NODE_ENV
              value: "production"

      # Pod disruption budget (for cluster upgrades)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - astro
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service

metadata:
  name: astro-service
  labels:
    app: astro
    tier: frontend

spec:
  type: ClusterIP  # Use Ingress for external traffic
  selector:
    app: astro
    tier: frontend

  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http

  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: v1
kind: PodDisruptionBudget

metadata:
  name: astro-pdb

spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: astro
      tier: frontend

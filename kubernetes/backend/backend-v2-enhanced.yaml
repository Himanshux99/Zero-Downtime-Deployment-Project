apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-v2-deployment
  labels:
    app: backend-v2
    tier: backend
    version: v2

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployment

  selector:
    matchLabels:
      app: backend-v2
      tier: backend

  template:
    metadata:
      labels:
        app: backend-v2
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend-v2
          image: himanshux99/astro-backend:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: api
              containerPort: 3000
              protocol: TCP

          # Resource allocation
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Environment variables
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: VERSION
              value: "v2"
            - name: FAILURE_RATE
              value: "0.1"  # Configurable failure injection for testing

          # Readiness probe - serve traffic when ready
          readinessProbe:
            httpGet:
              path: /api/v1/healthCheck
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /api/v1/healthCheck
              port: api
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          # Graceful shutdown with time for in-flight requests
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

          # Security context
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

          # Volume mounts for temp directories
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      # Volumes for non-root access
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      # Pod scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend-v2
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service

metadata:
  name: backend-v2-service
  labels:
    app: backend-v2
    tier: backend

spec:
  type: ClusterIP
  selector:
    app: backend-v2
    tier: backend

  ports:
    - port: 80
      targetPort: api
      protocol: TCP
      name: http

  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: v1
kind: PodDisruptionBudget

metadata:
  name: backend-v2-pdb

spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend-v2
      tier: backend

---
apiVersion: v1
kind: ConfigMap

metadata:
  name: backend-v2-config

data:
  NODE_ENV: "production"
  PORT: "3000"
  VERSION: "v2"
  FAILURE_RATE: "0.1"

---
# Optional: HorizontalPodAutoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: backend-v2-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-v2-deployment

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
